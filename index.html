<!DOCTYPE html>
<html>
<head>
    <title>Absentees Report</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background-color: #e6f2ff;
        }
        input, button {
            padding: 10px;
            margin: 10px 5px;
        }
        button {
            cursor: pointer;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
            background: white;
        }
        table, th, td {
            border: 1px solid black;
            text-align: center;
            padding: 8px;
        }
        #messageBox {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #000;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>

<h2>📋 Absentees Report</h2>

<label>Enter Roll Numbers (e.g. 11,25):</label><br>
<input type="text" id="absenteesInput" placeholder="Enter numbers only">
<br>

<button onclick="generateList()">Generate List</button>
<button onclick="copyMessage()">📋 Copy Message</button>

<div id="messageBox" style="display:none;"></div>

<table id="resultTable" style="display:none;">
    <thead>
        <tr>
            <th>Full Roll No</th>
            <th>Name</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

let finalMessage = "";

function generateList() {
    const input = document.getElementById("absenteesInput").value;
    const numbers = input.split(",").map(n => n.trim());

    const tableBody = document.getElementById("tableBody");
    tableBody.innerHTML = "";

    let messageNames = "";
    let found = false;

    numbers.forEach(num => {
        if (!num) return;

        let formattedNum = num.padStart(3, '0');
        let fullRoll = "25ITR" + formattedNum;

        if (students[fullRoll]) {
            found = true;

            tableBody.innerHTML += `
                <tr>
                    <td>${fullRoll}</td>
                    <td>${students[fullRoll]}</td>
                </tr>`;

            messageNames += `${fullRoll} - ${students[fullRoll]}\n`;
        }
    });

    if (!found) {
        alert("❌ No valid roll numbers found!");
        return;
    }

    document.getElementById("resultTable").style.display = "table";

    const today = new Date();
    const formattedDate = today.toLocaleDateString('en-IN');

    finalMessage = `Dear Parents,

Today's Absentees - ${formattedDate}

${messageNames}`;

    document.getElementById("messageBox").style.display = "block";
    document.getElementById("messageBox").innerHTML = finalMessage.replace(/\n/g, "<br>");
}

function copyMessage() {
    if (!finalMessage) {
        alert("Generate the list first!");
        return;
    }

    navigator.clipboard.writeText(finalMessage);
    alert("✅ Message Copied!");
}

</script>

</body>
</html>
